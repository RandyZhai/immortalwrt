name: Build XG-040G-MD v2 (iStore+ZT+Docker+Clash+Turbo)

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: '上传到 Release'
        type: boolean
        default: false
  # 每周自动编译（北京时间周日早上8点 = UTC周日凌晨0点）
  schedule:
    - cron: '0 0 * * 0'

env:
  TZ: Asia/Shanghai
  REPO_BRANCH: master
  UPLOAD_RELEASE: ${{ github.event.inputs.upload_release || false }}
  RELEASE_TAG: XG-040G-MD
  TARGET: airoha
  SUBTARGET: an7581
  DEVICE: nokia_xg-040g-md-ubi

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          # 安装编译依赖
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

          # 设置工作目录权限
          sudo chown -R runner:docker $GITHUB_WORKSPACE

          # 限制 ccache 大小
          ccache -M 5G

          # 清理可能存在的旧文件
          rm -rf ./bin
          rm -f ./.config*

      - name: Setup feeds and add third-party packages
        run: |
          # === 添加第三方软件源 ===

          # kenzok8 openwrt-packages (iStore, ZeroTier, Docker 等)
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default

          # kenzok8 small (代理/网络相关包)
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default

          echo ">>> feeds.conf.default content:"
          cat feeds.conf.default

          # === 更新所有 feeds ===
          ./scripts/feeds update -a

          # === 删除可能冲突的包 ===
          rm -rf feeds/luci/applications/luci-app-mosdns 2>/dev/null || true
          rm -rf feeds/packages/net/{alist,adguardhome,mosdns,xray*,v2ray*,sing*,smartdns} 2>/dev/null || true

          # === 安装所有 feeds ===
          ./scripts/feeds install -a

      - name: Generate build config
        run: |
          # === 创建 seed config ===
          cat > .config << 'EOF'
          # ========== 目标平台 ==========
          CONFIG_TARGET_airoha=y
          CONFIG_TARGET_airoha_an7581=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_DEVICE_airoha_an7581_DEVICE_nokia_xg-040g-md-ubi=y
          # （设备默认驱动包由 DEVICE_PACKAGES 自动引入，无需手动覆盖）

          # ========== 默认设备驱动（已由 DEVICE_PACKAGES 自动引入，此处仅记录）==========
          # ✅ kmod-usb3 → kmod-usb-xhci-mtk → kmod-usb-xhci-hcd   (USB 3.0 控制器)
          # ✅ kmod-phy-airoha-en8811h + airoha-en8811h-firmware     (2.5G EN8811H PHY)
          # ✅ kmod-usb-ledtrig-usbport                              (USB LED 触发)
          # ✅ kmod-gpio-button-hotplug + kmod-leds-gpio             (GPIO 按键/LED)
          # ✅ kmod-regulator-userspace-consumer                     (USB 电源管理)
          # ✅ airoha-en7581-npu-firmware + CONFIG_NET_AIROHA_NPU=y  (NPU 网络加速)
          # ✅ fitblk                                                (UBI fit 块设备)

          # ========== USB 存储支持 ==========
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_blockd=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_kmod-nls-cp437=y
          CONFIG_PACKAGE_kmod-nls-iso8859-1=y
          CONFIG_PACKAGE_kmod-nls-utf8=y

          # ========== USB 网络/串口 ==========
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-rndis=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-ftdi=y
          CONFIG_PACKAGE_kmod-usb-serial-pl2303=y

          # ========== LuCI 配置导航 (Web 管理界面) ==========
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-ipkg=y

          # ========== LuCI 主题 ==========
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
          CONFIG_PACKAGE_luci-app-argon-config=y

          # ========== iStore 应用商店 ==========
          CONFIG_PACKAGE_luci-app-store=y
          CONFIG_PACKAGE_luci-lib-taskd=y
          CONFIG_PACKAGE_luci-lib-xterm=y
          CONFIG_PACKAGE_taskd=y
          CONFIG_PACKAGE_quickstart=y
          CONFIG_PACKAGE_luci-app-quickstart=y

          # ========== ZeroTier 虚拟局域网 ==========
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_zerotier=y

          # ========== Turbo ACC 网络加速 (NPU 硬件加速管理面板) ==========
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_shortcut-fe=y
          CONFIG_PACKAGE_shortcut-fe-drv=y

          # ========== OpenClash 科学上网 ==========
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_coreutils-nohup=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_kmod-inet-diag=y

          # ========== Docker 容器 ==========
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_docker-compose=y

          # ========== 实用工具 ==========
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-nossl=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_coreutils=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_luci-app-commands=y

          # ========== 网络工具 ==========
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_ip6tables-mod-nat=y
          CONFIG_PACKAGE_resolveip=y

          # ========== 不使用 APK，使用 opkg ==========
          CONFIG_USE_APK=n
          CONFIG_PACKAGE_opkg=y
          EOF

          echo ">>> Seed .config created:"
          cat .config

          # === 展开完整配置 ===
          make defconfig

          echo ">>> Full .config generated"

      - name: Pre-build checks
        run: |
          echo ">>> Target info:"
          echo "  TARGET: ${{ env.TARGET }}"
          echo "  SUBTARGET: ${{ env.SUBTARGET }}"
          echo "  DEVICE: ${{ env.DEVICE }}"
          echo ""
          echo ">>> Disk space:"
          df -h
          echo ""
          echo ">>> Selected packages:"
          grep "^CONFIG_PACKAGE_.*=y" .config | sort

      - name: Download sources
        run: |
          make download -j$(nproc) V=s

      - name: Compile firmware
        run: |
          make -j$(nproc) V=s || make -j1 V=s
        timeout-minutes: 300

      - name: Prepare artifacts
        run: |
          mkdir -p ${{ github.workspace }}/artifact/

          # 复制固件文件
          find bin/targets/airoha/an7581/ -type f \( \
            -name "*.itb" -o \
            -name "*.bin" -o \
            -name "*.tar.gz" -o \
            -name "*.fip" -o \
            -name "sha256sums" -o \
            -name "*.manifest" \
          \) -exec cp {} ${{ github.workspace }}/artifact/ \;

          # 列出产物
          echo ">>> Artifacts:"
          ls -lh ${{ github.workspace }}/artifact/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-XG-040G-MD-${{ github.run_id }}
          path: ${{ github.workspace }}/artifact/
          retention-days: 14

      - name: Upload to Release
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ github.workspace }}/artifact/*
          body: |
            ## 🤖 ImmortalWrt XG-040G-MD 自动编译固件

            - 📅 编译日期：${{ github.event.repository.updated_at }}
            - 🔧 源码分支：${{ env.REPO_BRANCH }}
            - 🎯 目标设备：Nokia XG-040G-MD (UBI)
            - 🖥️ 平台：Airoha AN7581 (ARM64 Cortex-A53)

            ### 内置插件
            - ✅ **iStore** — 应用商店
            - ✅ **ZeroTier** — 虚拟局域网
            - ✅ **Docker** — 容器运行时
            - ✅ **配置导航** — LuCI Web 管理 + Argon 主题

            ### 刷入方法
            请使用 `sysupgrade.itb` 文件通过 LuCI 或命令行刷入。

            ---
            Build by GitHub Actions · Run ID: ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf ./bin
          rm -rf ./.config*
          ccache -c
