name: Build x86-generic AR9285 L2TP OpenClash

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "上传固件到 GitHub Release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: immortalwrt-x86-generic-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai

  # 建议固定稳定分支。
  # openwrt-24.10 使用 opkg，兼容性比 master 更稳定。
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10

  TARGET: x86
  SUBTARGET: 64

  RELEASE_TAG: immortalwrt-x86-generic
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    name: Build ImmortalWrt x86-64
    runs-on: ubuntu-24.04

    steps:
      # ============================================================
      # 1. 检出 ImmortalWrt 源代码
      # ============================================================
      - name: Checkout ImmortalWrt
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ env.REPO_BRANCH }}
          fetch-depth: 1

      # ============================================================
      # 2. 清理 Runner 磁盘空间
      # ============================================================
      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail

          echo ">>> Disk space before cleanup"
          df -h

          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true

          sudo apt-get clean
          sudo docker system prune --all --force --volumes || true

          echo ">>> Disk space after cleanup"
          df -h

      # ============================================================
      # 3. 安装编译环境
      # ============================================================
      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            ack \
            antlr3 \
            asciidoc \
            autoconf \
            automake \
            autopoint \
            binutils \
            bison \
            build-essential \
            bzip2 \
            ccache \
            clang \
            cmake \
            cpio \
            curl \
            device-tree-compiler \
            ecj \
            fastjar \
            flex \
            gawk \
            gettext \
            gcc-multilib \
            g++-multilib \
            git \
            gnutls-dev \
            gperf \
            haveged \
            help2man \
            intltool \
            lib32gcc-s1 \
            libc6-dev-i386 \
            libelf-dev \
            libglib2.0-dev \
            libgmp3-dev \
            libltdl-dev \
            libmpc-dev \
            libmpfr-dev \
            libncurses-dev \
            libpython3-dev \
            libreadline-dev \
            libssl-dev \
            libtool \
            libyaml-dev \
            libz-dev \
            lld \
            llvm \
            lrzsz \
            make \
            mkisofs \
            msmtp \
            nano \
            ninja-build \
            p7zip \
            p7zip-full \
            patch \
            pkgconf \
            python3 \
            python3-docutils \
            python3-pip \
            python3-ply \
            python3-pyelftools \
            qemu-utils \
            re2c \
            rsync \
            scons \
            squashfs-tools \
            subversion \
            swig \
            texinfo \
            uglifyjs \
            unzip \
            upx-ucl \
            vim \
            wget \
            xmlto \
            xxd \
            zlib1g-dev \
            zstd

          ccache --max-size=5G
          ccache --zero-stats

          echo ">>> Build environment ready"

      # ============================================================
      # 4. 缓存下载文件和 ccache
      # ============================================================
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            dl
            ${{ env.CCACHE_DIR }}
          key: immortalwrt-${{ env.REPO_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ github.run_id }}
          restore-keys: |
            immortalwrt-${{ env.REPO_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-
            immortalwrt-${{ env.REPO_BRANCH }}-

      # ============================================================
      # 5. 更新官方 feeds
      # ============================================================
      - name: Update official feeds
        shell: bash
        run: |
          set -euo pipefail

          echo ">>> feeds.conf.default"
          cat feeds.conf.default

          FEEDS_OK=false

          for attempt in 1 2 3; do
            echo ">>> Feeds update attempt ${attempt}/3"

            if ./scripts/feeds update -a; then
              FEEDS_OK=true
              break
            fi

            echo ">>> Feeds update failed, retrying"
            sleep 30
          done

          if [ "$FEEDS_OK" != "true" ]; then
            echo "!!! feeds update failed after 3 attempts"
            exit 1
          fi

          ./scripts/feeds install -a

      # ============================================================
      # 6. 添加 OpenClash 官方源码
      # ============================================================
      - name: Add OpenClash
        shell: bash
        run: |
          set -euo pipefail

          rm -rf package/openclash
          mkdir -p package/openclash

          git clone \
            --depth 1 \
            --branch master \
            https://github.com/vernesong/OpenClash.git \
            package/openclash/OpenClash

          OPENCLASH_MAKEFILE="$(
            find package/openclash \
              -type f \
              -path "*/luci-app-openclash/Makefile" \
              -print \
              -quit
          )"

          if [ -z "$OPENCLASH_MAKEFILE" ]; then
            echo "!!! OpenClash Makefile not found"
            find package/openclash -maxdepth 4 -type f | sort | head -100
            exit 1
          fi

          echo ">>> OpenClash Makefile found:"
          echo "$OPENCLASH_MAKEFILE"

      # ============================================================
      # 7. 生成编译配置
      # ============================================================
      - name: Generate build configuration
        shell: bash
        run: |
          set -euo pipefail

          rm -f .config
          rm -f .config.old

          cat > .config <<'EOF'
          # ========================================================
          # Build acceleration
          # ========================================================
          CONFIG_CCACHE=y

          # ========================================================
          # Target: x86-64 generic
          # ========================================================
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          # ========================================================
          # Firmware image formats
          # ========================================================
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y

          # ========================================================
          # Package manager: opkg
          # This configuration targets ImmortalWrt openwrt-24.10
          # ========================================================
          CONFIG_USE_APK=n
          CONFIG_PACKAGE_opkg=y

          # ========================================================
          # LuCI web interface
          # ========================================================
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-mod-status=y
          CONFIG_PACKAGE_luci-mod-system=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-ipkg=y

          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          # ========================================================
          # Basic system packages
          # ========================================================
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_openssl-util=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_tar=y
          CONFIG_PACKAGE_gzip=y

          # ========================================================
          # AR9285 wireless support
          #
          # AR9285 normally uses PCI/PCIe ath9k.
          # ath9k-htc is not required for normal AR9285 PCIe cards.
          # ========================================================
          CONFIG_PACKAGE_kmod-ath=y
          CONFIG_PACKAGE_kmod-ath9k=y
          CONFIG_PACKAGE_ath9k-common=y
          CONFIG_PACKAGE_wireless-regdb=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_iwinfo=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_kmod-mac80211=y

          CONFIG_PACKAGE_hostapd=y
          CONFIG_PACKAGE_wpa-supplicant=y
          CONFIG_PACKAGE_wpad-basic-mbedtls=n

          # ========================================================
          # PPP and L2TP
          # LuCI PPP protocol support is provided by luci-proto-ppp.
          # ========================================================
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppol2tp=y
          CONFIG_PACKAGE_ppp-mod-pptp=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_kmod-l2tp=y
          CONFIG_PACKAGE_kmod-ppp=y
          CONFIG_PACKAGE_kmod-pppoe=y
          CONFIG_PACKAGE_kmod-pppol2tp=y
          CONFIG_PACKAGE_kmod-pptp=y
          CONFIG_PACKAGE_luci-proto-ppp=y

          # ========================================================
          # StrongSwan IPSec
          # Do not install ipsec-tools together with StrongSwan.
          # ========================================================
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-ipsec=y

          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-gcm=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-nonce=y
          CONFIG_PACKAGE_strongswan-mod-pem=y
          CONFIG_PACKAGE_strongswan-mod-pgp=y
          CONFIG_PACKAGE_strongswan-mod-pkcs1=y
          CONFIG_PACKAGE_strongswan-mod-pkcs8=y
          CONFIG_PACKAGE_strongswan-mod-pubkey=y
          CONFIG_PACKAGE_strongswan-mod-random=y
          CONFIG_PACKAGE_strongswan-mod-sha1=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-socket-default=y
          CONFIG_PACKAGE_strongswan-mod-stroke=y
          CONFIG_PACKAGE_strongswan-mod-updown=y
          CONFIG_PACKAGE_strongswan-mod-x509=y
          CONFIG_PACKAGE_strongswan-mod-xauth-generic=y
          CONFIG_PACKAGE_strongswan-mod-gmp=y

          # ========================================================
          # OpenClash
          #
          # Mihomo core is normally downloaded and managed by
          # OpenClash itself after installation.
          # ========================================================
          CONFIG_PACKAGE_luci-app-openclash=y

          # OpenClash runtime dependencies
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_dnsmasq=n
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_coreutils=y
          CONFIG_PACKAGE_coreutils-nohup=y
          CONFIG_PACKAGE_coreutils-timeout=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y

          # TUN / TProxy support
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_kmod-nft-socket=y
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_ip6tables-mod-nat=y

          # ========================================================
          # Firewall and networking tools
          # ========================================================
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables-json=y
          CONFIG_PACKAGE_kmod-nft-core=y
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_kmod-nft-offload=y

          CONFIG_PACKAGE_resolveip=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_bind-dig=y

          # ========================================================
          # Disk and filesystem support for x86 systems
          # ========================================================
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_resize2fs=y
          CONFIG_PACKAGE_e2fsprogs=y

          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_kmod-fs-f2fs=y

          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y

          # ========================================================
          # Common x86 Ethernet drivers
          # ========================================================
          CONFIG_PACKAGE_kmod-e1000=y
          CONFIG_PACKAGE_kmod-e1000e=y
          CONFIG_PACKAGE_kmod-igb=y
          CONFIG_PACKAGE_kmod-igc=y
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-tg3=y

          # ========================================================
          # Administration and utilities
          # ========================================================
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_lsof=y
          CONFIG_PACKAGE_tree=y
          CONFIG_PACKAGE_screen=y
          CONFIG_PACKAGE_terminfo=y
          EOF

          echo ">>> Seed configuration created"

          make defconfig

          echo ">>> Full configuration generated"

      # ============================================================
      # 8. 严格验证关键软件包
      # ============================================================
      - name: Validate build configuration
        shell: bash
        run: |
          set -euo pipefail

          echo ">>> Validate target"

          grep -q '^CONFIG_TARGET_x86=y$' .config
          grep -q '^CONFIG_TARGET_x86_64=y$' .config
          grep -q '^CONFIG_TARGET_x86_64_DEVICE_generic=y$' .config

          REQUIRED_PACKAGES="
          luci
          luci-i18n-base-zh-cn
          kmod-ath9k
          hostapd
          wpa-supplicant
          xl2tpd
          ppp
          ppp-mod-pppol2tp
          kmod-l2tp
          kmod-pppol2tp
          luci-proto-ppp
          strongswan
          strongswan-charon
          luci-app-openclash
          dnsmasq-full
          bash
          curl
          ca-bundle
          ip-full
          ruby
          ruby-yaml
          kmod-tun
          kmod-inet-diag
          kmod-nft-tproxy
          "

          MISSING=""

          echo ">>> Validate required packages"

          for package in $REQUIRED_PACKAGES; do
            if grep -q "^CONFIG_PACKAGE_${package}=y$" .config; then
              echo "  OK      ${package}"
            else
              echo "  MISSING ${package}"
              MISSING="${MISSING} ${package}"
            fi
          done

          if grep -q '^CONFIG_PACKAGE_dnsmasq=y$' .config; then
            echo "!!! Both dnsmasq and dnsmasq-full are enabled"
            exit 1
          fi

          if ! grep -q '^CONFIG_PACKAGE_dnsmasq-full=y$' .config; then
            echo "!!! dnsmasq-full is not enabled"
            exit 1
          fi

          if grep -q '^CONFIG_USE_APK=y$' .config; then
            echo "!!! APK was unexpectedly enabled"
            exit 1
          fi

          if ! grep -q '^CONFIG_PACKAGE_opkg=y$' .config; then
            echo "!!! opkg is not enabled"
            exit 1
          fi

          if [ -n "$MISSING" ]; then
            echo ""
            echo "!!! Required packages were not selected:"
            echo "$MISSING"
            echo ""
            echo ">>> Related configuration entries:"
            grep -E \
              'CONFIG_PACKAGE_(luci-app-openclash|xl2tpd|ppp|strongswan|kmod-ath9k|hostapd|wpa-supplicant|dnsmasq)' \
              .config || true
            exit 1
          fi

          echo ""
          echo ">>> All required packages are enabled"
          echo ">>> opkg is enabled"
          echo ">>> dnsmasq-full is enabled"
          echo ">>> Build configuration validation passed"

      # ============================================================
      # 9. 显示构建信息
      # ============================================================
      - name: Show build information
        shell: bash
        run: |
          set -euo pipefail

          echo ">>> Branch"
          echo "${REPO_BRANCH}"

          echo ""
          echo ">>> Source revision"
          git log -1 --oneline

          echo ""
          echo ">>> Target"
          echo "${TARGET}/${SUBTARGET}"

          echo ""
          echo ">>> Disk space"
          df -h

          echo ""
          echo ">>> Selected important packages"
          grep -E \
            '^CONFIG_PACKAGE_(luci|luci-app-openclash|kmod-ath9k|hostapd|wpa-supplicant|xl2tpd|ppp|strongswan|dnsmasq-full|kmod-tun|kmod-nft-tproxy)=y$' \
            .config \
            | sort

      # ============================================================
      # 10. 下载源码包
      # ============================================================
      - name: Download package sources
        shell: bash
        timeout-minutes: 120
        run: |
          set -euo pipefail

          DOWNLOAD_OK=false

          for attempt in 1 2 3; do
            echo ">>> Download attempt ${attempt}/3"

            if make download -j"$(nproc)" V=s; then
              DOWNLOAD_OK=true
              break
            fi

            echo ">>> Download failed, retrying"
            sleep 30
          done

          if [ "$DOWNLOAD_OK" != "true" ]; then
            echo "!!! make download failed after 3 attempts"
            exit 1
          fi

          echo ">>> Check downloaded files"

          find dl \
            -type f \
            -size -1024c \
            -print \
            -delete || true

      # ============================================================
      # 11. 编译固件
      # ============================================================
      - name: Compile firmware
        shell: bash
        timeout-minutes: 360
        run: |
          set -o pipefail

          echo ">>> Starting parallel build"

          if make -j"$(nproc)" V=s 2>&1 | tee build-parallel.log; then
            echo ">>> Parallel build completed successfully"
          else
            echo "!!! Parallel build failed"
            echo ">>> Retrying with a single build process"

            make -j1 V=sc 2>&1 | tee build-single.log
          fi

          echo ""
          echo ">>> ccache statistics"
          ccache --show-stats

      # ============================================================
      # 12. 生成编译日期
      # ============================================================
      - name: Set artifact metadata
        shell: bash
        run: |
          set -euo pipefail

          echo "BUILD_DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date +'%Y-%m-%d_%H-%M-%S')" >> "$GITHUB_ENV"
          echo "SHORT_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      # ============================================================
      # 13. 整理固件文件
      # ============================================================
      - name: Prepare firmware artifacts
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_DIR="${GITHUB_WORKSPACE}/artifact"

          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          TARGET_DIR="bin/targets/${TARGET}/${SUBTARGET}"

          if [ ! -d "$TARGET_DIR" ]; then
            echo "!!! Target output directory not found: ${TARGET_DIR}"
            find bin/targets -maxdepth 3 -type d -print || true
            exit 1
          fi

          find "$TARGET_DIR" \
            -maxdepth 1 \
            -type f \
            \( \
              -name "*.img.gz" \
              -o -name "*.iso" \
              -o -name "*.vmdk" \
              -o -name "*.vdi" \
              -o -name "*.vhdx" \
              -o -name "*.qcow2" \
              -o -name "*.tar.gz" \
              -o -name "*.bin" \
              -o -name "*.manifest" \
              -o -name "*.buildinfo" \
              -o -name "*.json" \
              -o -name "sha256sums" \
            \) \
            -exec cp -v {} "$ARTIFACT_DIR/" \;

          cp .config "$ARTIFACT_DIR/config.buildinfo"

          git log -1 --format=fuller > "$ARTIFACT_DIR/source-version.txt"

          {
            echo "Repository: ${REPO_URL}"
            echo "Branch: ${REPO_BRANCH}"
            echo "Target: ${TARGET}/${SUBTARGET}"
            echo "Commit: $(git rev-parse HEAD)"
            echo "Build date: ${BUILD_DATE}"
            echo "GitHub run ID: ${GITHUB_RUN_ID}"
            echo "GitHub run number: ${GITHUB_RUN_NUMBER}"
          } > "$ARTIFACT_DIR/build-information.txt"

          if [ -z "$(find "$ARTIFACT_DIR" -maxdepth 1 -type f -name '*.img.gz' -print -quit)" ]; then
            echo "!!! No compressed x86 disk image was generated"
            ls -lah "$TARGET_DIR"
            exit 1
          fi

          echo ""
          echo ">>> Firmware artifacts"
          ls -lah "$ARTIFACT_DIR"

      # ============================================================
      # 14. 上传 Actions Artifact
      # ============================================================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-x86-64-${{ env.BUILD_TIME }}-${{ env.SHORT_COMMIT }}
          path: ${{ github.workspace }}/artifact/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      # ============================================================
      # 15. 发布到 GitHub Release
      # ============================================================
      - name: Upload firmware to GitHub Release
        if: ${{ inputs.upload_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ImmortalWrt x86-64 Latest Build
          target_commitish: ${{ github.sha }}
          prerelease: false
          draft: false
          make_latest: true
          files: |
            ${{ github.workspace }}/artifact/*
          body: |
            ## ImmortalWrt x86-64 自动编译固件

            ### 编译信息

            - 编译日期：${{ env.BUILD_DATE }}
            - 源码仓库：ImmortalWrt
            - 源码分支：${{ env.REPO_BRANCH }}
            - 源码版本：${{ env.SHORT_COMMIT }}
            - 目标平台：x86/64
            - 目标设备：x86-64 generic
            - 包管理器：opkg
            - GitHub Actions Run ID：${{ github.run_id }}

            ### 内置功能

            - AR9285 无线网卡支持
            - ath9k 无线驱动
            - hostapd 无线 AP
            - wpa-supplicant 无线客户端
            - L2TP 客户端支持
            - PPP over L2TP 支持
            - StrongSwan IPSec
            - OpenClash LuCI 插件
            - dnsmasq-full
            - TUN 和 TProxy 支持
            - 中文 LuCI 管理界面

            ### OpenClash 内核

            固件内置 OpenClash LuCI 插件及运行依赖。Mihomo 内核由 OpenClash
            在首次使用时通过插件页面下载和管理。

            ### 镜像说明

            - `combined.img.gz`：传统 BIOS 启动磁盘镜像
            - `combined-efi.img.gz`：UEFI 启动磁盘镜像
            - `rootfs.img.gz`：仅根文件系统镜像
            - `rootfs.tar.gz`：容器或手工部署根文件系统
            - `manifest`：固件内置软件包列表
            - `sha256sums`：文件完整性校验值

            ### 写盘建议

            实体 x86 设备推荐优先使用带 `combined-efi.img.gz` 的镜像。
            老式 BIOS 设备可使用不带 EFI 的 `combined.img.gz` 镜像。

            请在写盘前确认目标磁盘，写盘操作会覆盖目标磁盘上的原有数据。

            ---

            Build by GitHub Actions

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # 16. 构建失败时上传日志
      # ============================================================
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-build-logs-${{ github.run_id }}
          path: |
            build-parallel.log
            build-single.log
            .config
            logs/
          if-no-files-found: ignore
          retention-days: 7

      # ============================================================
      # 17. 清理
      # ============================================================
      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf staging_dir
          rm -rf build_dir
          rm -rf tmp

          echo ">>> Final disk space"
          df -h

          echo ">>> Final ccache statistics"
          ccache --show-stats || true
