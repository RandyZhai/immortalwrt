name: Build x86-generic AR9285 L2TP OpenClash

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "上传固件到 GitHub Release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: immortalwrt-x86-generic-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  TARGET: x86
  SUBTARGET: 64
  RELEASE_TAG: immortalwrt-x86-generic
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    name: Build ImmortalWrt x86-64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout ImmortalWrt
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ env.REPO_BRANCH }}
          fetch-depth: 1

      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo apt-get clean >/dev/null 2>&1 || true
          sudo docker system prune --all --force --volumes >/dev/null 2>&1 || true
          df -h

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          LOG="${RUNNER_TEMP}/apt-build-dependencies.log"

          if ! sudo apt-get update -qq >"$LOG" 2>&1; then
            echo "::error::apt-get update failed"
            grep -Ei '(^|[[:space:]])(error|failed|fatal|E:)' "$LOG" | tail -100 || tail -100 "$LOG"
            exit 1
          fi

          if ! sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm \
            lrzsz make mkisofs msmtp nano ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-docutils python3-pip python3-ply \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs unzip upx-ucl vim wget xmlto xxd \
            zlib1g-dev zstd >>"$LOG" 2>&1; then
            echo "::error::Build dependency installation failed"
            grep -Ei '(^|[[:space:]])(error|failed|fatal|E:)' "$LOG" | tail -150 || tail -150 "$LOG"
            exit 1
          fi

          ccache --max-size=5G >/dev/null
          ccache --zero-stats >/dev/null

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            dl
            ${{ env.CCACHE_DIR }}
          key: immortalwrt-${{ env.REPO_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ github.sha }}
          restore-keys: |
            immortalwrt-${{ env.REPO_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-
            immortalwrt-${{ env.REPO_BRANCH }}-

      - name: Update and install official feeds
        shell: bash
        run: |
          set -euo pipefail
          LOG="${RUNNER_TEMP}/feeds.log"
          : >"$LOG"

          FEEDS_OK=false
          for attempt in 1 2 3; do
            echo "Feeds update attempt ${attempt}" >>"$LOG"
            if ./scripts/feeds update -a >>"$LOG" 2>&1; then
              FEEDS_OK=true
              break
            fi
            sleep 30
          done

          if [ "$FEEDS_OK" != "true" ]; then
            echo "::error::Official feeds update failed after 3 attempts"
            grep -Ei '(error|failed|fatal|not found|does not exist|unable|timeout)' "$LOG" | tail -150 || tail -150 "$LOG"
            exit 1
          fi

          if ! ./scripts/feeds install -a >>"$LOG" 2>&1; then
            echo "::error::Official feeds installation failed"
            grep -Ei '(error|failed|fatal|not found|does not exist|unable)' "$LOG" | tail -150 || tail -150 "$LOG"
            exit 1
          fi

      - name: Patch libffi to avoid host-triplet mismatch (known upstream bug)
        shell: bash
        run: |
          set -euo pipefail
          LOG="${RUNNER_TEMP}/libffi-patch.log"
          : >"$LOG"

          LIBFFI_MK="$(find feeds/packages/libs/libffi -maxdepth 2 -type f -name Makefile -print -quit 2>/dev/null || true)"

          if [ -z "$LIBFFI_MK" ]; then
            echo "libffi Makefile not found under feeds/packages/libs/libffi. Skipping patch." | tee -a "$LOG"
            exit 0
          fi

          echo "Found libffi Makefile: $LIBFFI_MK" | tee -a "$LOG"
          cp "$LIBFFI_MK" "$LIBFFI_MK.bak"

          # 1) Remove autoreconf fixup that breaks host triplet detection
          if grep -qE '^[[:space:]]*PKG_FIXUP[[:space:]]*[:+]?=.*autoreconf' "$LIBFFI_MK"; then
            sed -i -E 's|^([[:space:]]*)PKG_FIXUP([[:space:]]*[:+]?=.*)autoreconf(.*)$|\1# PKG_FIXUP\2autoreconf\3  # patched: skip autoreconf|' "$LIBFFI_MK"
            echo "Removed autoreconf fixup" | tee -a "$LOG"
          else
            echo "PKG_FIXUP autoreconf line not found. Nothing to strip." | tee -a "$LOG"
          fi

          # 2) Loosen fficonfig.h glob so any linux triplet directory matches
          if grep -q 'x86_64-openwrt-linux' "$LIBFFI_MK"; then
            sed -i 's|x86_64-openwrt-linux\*|*-linux-*|g' "$LIBFFI_MK"
            echo "Loosened x86_64-openwrt-linux* glob" | tee -a "$LOG"
          fi
          if grep -qE '\$\(REAL_GNU_TARGET_NAME\)' "$LIBFFI_MK"; then
            sed -i 's|\$(REAL_GNU_TARGET_NAME)/fficonfig.h|*-linux-*/fficonfig.h|g' "$LIBFFI_MK"
            echo "Loosened REAL_GNU_TARGET_NAME glob" | tee -a "$LOG"
          fi

          echo "===== Patched libffi Makefile diff ====="
          diff -u "$LIBFFI_MK.bak" "$LIBFFI_MK" || true

      - name: Prepare OpenClash package source (internal feeds first)
        shell: bash
        run: |
          set -euo pipefail
          LOG="${RUNNER_TEMP}/openclash-source.log"
          : >"$LOG"

          echo "Checking internal feeds for luci-app-openclash..." | tee -a "$LOG"

          INTERNAL_OPENCLASH_PATH="$(find package/feeds package -type d -name 'luci-app-openclash' -print -quit 2>/dev/null || true)"

          if [ -n "$INTERNAL_OPENCLASH_PATH" ]; then
            echo "Using internal luci-app-openclash: ${INTERNAL_OPENCLASH_PATH}" | tee -a "$LOG"
            exit 0
          fi

          echo "Internal luci-app-openclash not found. Falling back to official upstream." | tee -a "$LOG"

          mkdir -p package/external
          rm -rf package/external/openclash-src package/external/luci-app-openclash

          if ! git clone --depth 1 --branch master \
            https://github.com/vernesong/OpenClash.git \
            package/external/openclash-src >>"$LOG" 2>&1; then
            echo "::error::OpenClash official source clone failed"
            grep -Ei '(error|failed|fatal|not found|unable)' "$LOG" | tail -100 || tail -100 "$LOG"
            exit 1
          fi

          if [ ! -f package/external/openclash-src/luci-app-openclash/Makefile ]; then
            echo "::error::OpenClash Makefile not found in official source"
            find package/external/openclash-src -maxdepth 3 -type f -name Makefile | sort
            exit 1
          fi

          ln -s openclash-src/luci-app-openclash package/external/luci-app-openclash

          if [ ! -f package/external/luci-app-openclash/Makefile ]; then
            echo "::error::OpenClash symlink Makefile check failed"
            exit 1
          fi

          echo "Using external OpenClash official source fallback." | tee -a "$LOG"

      - name: Generate build configuration
        shell: bash
        run: |
          set -euo pipefail
          LOG="${RUNNER_TEMP}/defconfig.log"
          rm -f .config .config.old

          cat > .config <<'EOF'
          CONFIG_CCACHE=y

          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y

          # Prefer opkg on 24.10
          # CONFIG_USE_APK is not set
          CONFIG_PACKAGE_opkg=y

          # LuCI base
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-mod-status=y
          CONFIG_PACKAGE_luci-mod-system=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-ipkg=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          # Basic userland
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_openssl-util=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_tar=y
          CONFIG_PACKAGE_gzip=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_coreutils=y
          CONFIG_PACKAGE_coreutils-nohup=y
          CONFIG_PACKAGE_jsonfilter=y
          CONFIG_PACKAGE_resolveip=y
          CONFIG_PACKAGE_ip-full=y

          # AR9285 / ath9k wireless
          CONFIG_PACKAGE_kmod-ath=y
          CONFIG_PACKAGE_kmod-ath9k=y
          CONFIG_PACKAGE_ath9k-common=y
          CONFIG_PACKAGE_wireless-regdb=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_iwinfo=y
          CONFIG_PACKAGE_hostapd=y
          CONFIG_PACKAGE_wpa-supplicant=y
          # CONFIG_PACKAGE_wpad-basic-mbedtls is not set

          # L2TP / PPPoL2TP
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppol2tp=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_kmod-l2tp=y
          CONFIG_PACKAGE_kmod-pppol2tp=y
          CONFIG_PACKAGE_luci-proto-ppp=y

          # IPSec / StrongSwan
          CONFIG_PACKAGE_strongswan=y
          CONFIG_PACKAGE_strongswan-charon=y
          CONFIG_PACKAGE_strongswan-ipsec=y
          CONFIG_PACKAGE_strongswan-mod-aes=y
          CONFIG_PACKAGE_strongswan-mod-gcm=y
          CONFIG_PACKAGE_strongswan-mod-gmp=y
          CONFIG_PACKAGE_strongswan-mod-hmac=y
          CONFIG_PACKAGE_strongswan-mod-kernel-netlink=y
          CONFIG_PACKAGE_strongswan-mod-nonce=y
          CONFIG_PACKAGE_strongswan-mod-pem=y
          CONFIG_PACKAGE_strongswan-mod-pkcs1=y
          CONFIG_PACKAGE_strongswan-mod-pkcs8=y
          CONFIG_PACKAGE_strongswan-mod-pubkey=y
          CONFIG_PACKAGE_strongswan-mod-random=y
          CONFIG_PACKAGE_strongswan-mod-sha1=y
          CONFIG_PACKAGE_strongswan-mod-sha2=y
          CONFIG_PACKAGE_strongswan-mod-socket-default=y
          CONFIG_PACKAGE_strongswan-mod-stroke=y
          CONFIG_PACKAGE_strongswan-mod-updown=y
          CONFIG_PACKAGE_strongswan-mod-x509=y
          CONFIG_PACKAGE_strongswan-mod-xauth-generic=y

          # OpenClash
          CONFIG_PACKAGE_luci-app-openclash=y
          # CONFIG_PACKAGE_dnsmasq is not set
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_kmod-nft-socket=y
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_iptables-nft=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y

          # Diagnostics
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_lsof=y
          CONFIG_PACKAGE_tree=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_openssh-sftp-server=y

          # USB storage / filesystems
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_resize2fs=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y

          # x86 common NIC drivers
          CONFIG_PACKAGE_kmod-e1000=y
          CONFIG_PACKAGE_kmod-e1000e=y
          CONFIG_PACKAGE_kmod-igb=y
          CONFIG_PACKAGE_kmod-igc=y
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-tg3=y
          EOF

          # Strip the 10-space YAML indentation that leaked into .config via the heredoc
          sed -i 's/^          //' .config

          # Sanity check: every CONFIG_ line must be at column 0
          if grep -nE '^[[:space:]]+CONFIG_' .config; then
            echo "::error::Unexpected leading whitespace before CONFIG_ symbols in .config"
            exit 1
          fi

          if ! make defconfig >"$LOG" 2>&1; then
            echo "::error::make defconfig failed"
            grep -Ei '(error|failed|fatal|not found|does not exist|warning:.*dependency|symbol)' "$LOG" | tail -200 || tail -200 "$LOG"
            exit 1
          fi

      - name: Validate build configuration
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_CONFIGS="
          CONFIG_TARGET_x86
          CONFIG_TARGET_x86_64
          CONFIG_TARGET_x86_64_DEVICE_generic
          CONFIG_PACKAGE_luci
          CONFIG_PACKAGE_luci-base
          CONFIG_PACKAGE_luci-compat
          CONFIG_PACKAGE_luci-lib-ipkg
          CONFIG_PACKAGE_kmod-ath9k
          CONFIG_PACKAGE_hostapd
          CONFIG_PACKAGE_wpa-supplicant
          CONFIG_PACKAGE_xl2tpd
          CONFIG_PACKAGE_ppp
          CONFIG_PACKAGE_ppp-mod-pppol2tp
          CONFIG_PACKAGE_kmod-l2tp
          CONFIG_PACKAGE_kmod-pppol2tp
          CONFIG_PACKAGE_luci-proto-ppp
          CONFIG_PACKAGE_strongswan
          CONFIG_PACKAGE_strongswan-charon
          CONFIG_PACKAGE_luci-app-openclash
          CONFIG_PACKAGE_dnsmasq-full
          CONFIG_PACKAGE_bash
          CONFIG_PACKAGE_curl
          CONFIG_PACKAGE_ca-bundle
          CONFIG_PACKAGE_ip-full
          CONFIG_PACKAGE_ruby
          CONFIG_PACKAGE_ruby-yaml
          CONFIG_PACKAGE_kmod-tun
          CONFIG_PACKAGE_kmod-inet-diag
          CONFIG_PACKAGE_kmod-nft-tproxy
          CONFIG_PACKAGE_opkg
          "

          MISSING=""
          for symbol in $REQUIRED_CONFIGS; do
            if ! grep -q "^${symbol}=y$" .config; then
              MISSING="${MISSING} ${symbol}"
            fi
          done

          if grep -q '^CONFIG_PACKAGE_dnsmasq=y$' .config; then
            echo "::error::dnsmasq conflicts with dnsmasq-full"
            exit 1
          fi

          if grep -q '^CONFIG_USE_APK=y$' .config; then
            echo "::error::APK was unexpectedly enabled"
            exit 1
          fi

          if grep -q '^CONFIG_PACKAGE_wpad-basic-mbedtls=y$' .config; then
            echo "::error::wpad-basic-mbedtls conflicts with hostapd + wpa-supplicant selection"
            exit 1
          fi

          if [ -n "$MISSING" ]; then
            echo "::error::Required configuration missing:${MISSING}"
            for symbol in $MISSING; do
              grep -E "^#? ?${symbol}" .config || true
            done
            exit 1
          fi

          echo "Configuration validation passed."

      - name: Download package sources
        shell: bash
        timeout-minutes: 120
        run: |
          set -euo pipefail
          LOG="${RUNNER_TEMP}/download.log"
          : >"$LOG"
          DOWNLOAD_OK=false

          for attempt in 1 2 3; do
            echo "Download attempt ${attempt}" >>"$LOG"
            if make download -j"$(nproc)" V=s >>"$LOG" 2>&1; then
              DOWNLOAD_OK=true
              break
            fi
            sleep 30
          done

          if [ "$DOWNLOAD_OK" != "true" ]; then
            echo "::error::make download failed after 3 attempts"
            grep -Ei '(error|failed|fatal|not found|404|hash mismatch|download failed|unable|timeout)' "$LOG" | tail -250 || tail -250 "$LOG"
            exit 1
          fi

          find dl -type f -size -1024c -delete || true

      - name: Compile firmware
        shell: bash
        timeout-minutes: 360
        run: |
          set -o pipefail
          PARALLEL_LOG="${GITHUB_WORKSPACE}/build-parallel.log"
          SERIAL_LOG="${GITHUB_WORKSPACE}/build-single.log"

          if make -j"$(nproc)" V=s >"$PARALLEL_LOG" 2>&1; then
            exit 0
          fi

          if make -j1 V=sc >"$SERIAL_LOG" 2>&1; then
            exit 0
          fi

          echo "::error::Firmware build failed"
          echo "===== Error summary from serial build ====="
          grep -Ei \
            '(error:|error [0-9]+|failed to build|no such file|cannot stat|not found|undefined reference|recipe for target|make\[[0-9]+\]: \*\*\*)' \
            "$SERIAL_LOG" | tail -250 || true
          echo "===== Last 120 lines ====="
          tail -120 "$SERIAL_LOG"
          exit 1

      - name: Set artifact metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "BUILD_DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date +'%Y-%m-%d_%H-%M-%S')" >> "$GITHUB_ENV"
          echo "SHORT_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Prepare firmware artifacts
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/artifact"
          TARGET_DIR="bin/targets/${TARGET}/${SUBTARGET}"

          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          if [ ! -d "$TARGET_DIR" ]; then
            echo "::error::Target output directory not found: ${TARGET_DIR}"
            exit 1
          fi

          find "$TARGET_DIR" -maxdepth 1 -type f \
            \( -name '*.img.gz' -o -name '*.iso' -o -name '*.vmdk' \
               -o -name '*.vdi' -o -name '*.vhdx' -o -name '*.qcow2' \
               -o -name '*.tar.gz' -o -name '*.bin' -o -name '*.manifest' \
               -o -name '*.buildinfo' -o -name '*.json' -o -name 'sha256sums' \) \
            -exec cp {} "$ARTIFACT_DIR/" \;

          cp .config "$ARTIFACT_DIR/config.buildinfo"
          git log -1 --format=fuller > "$ARTIFACT_DIR/source-version.txt"

          {
            echo "Repository: ${REPO_URL}"
            echo "Branch: ${REPO_BRANCH}"
            echo "Target: ${TARGET}/${SUBTARGET}"
            echo "Commit: $(git rev-parse HEAD)"
            echo "Build date: ${BUILD_DATE}"
            echo "GitHub run ID: ${GITHUB_RUN_ID}"
            echo "OpenClash source policy: internal feeds first, official upstream fallback only when missing"
          } > "$ARTIFACT_DIR/build-information.txt"

          if ! find "$ARTIFACT_DIR" -maxdepth 1 -type f -name '*.img.gz' -print -quit | grep -q .; then
            echo "::error::No compressed x86 disk image was generated"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-x86-64-${{ env.BUILD_TIME }}-${{ env.SHORT_COMMIT }}
          path: ${{ github.workspace }}/artifact/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload firmware to GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ImmortalWrt x86-64 Latest Build
          prerelease: false
          draft: false
          make_latest: true
          files: |
            ${{ github.workspace }}/artifact/*
          body: |
            ## ImmortalWrt x86-64 自动编译固件

            - 编译日期：${{ env.BUILD_DATE }}
            - 源码分支：${{ env.REPO_BRANCH }}
            - 源码版本：${{ env.SHORT_COMMIT }}
            - 目标设备：x86-64 generic
            - 包管理器：opkg
            - OpenClash 来源：优先内部 feeds，缺失时回退到 vernesong/OpenClash 官方仓库

            ### 内置功能

            - AR9285 / ath9k
            - hostapd 与 wpa-supplicant
            - L2TP / PPPoL2TP
            - StrongSwan IPSec
            - OpenClash
            - dnsmasq-full
            - 中文 LuCI
            - USB 存储与常见 x86 网卡驱动

            Mihomo 内核由 OpenClash 在安装后下载和管理。

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-x86-build-errors-${{ github.run_id }}
          path: |
            build-parallel.log
            build-single.log
            .config
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf staging_dir build_dir tmp
